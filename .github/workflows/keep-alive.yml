name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 6 days at 8am UTC — prevents Supabase free tier from pausing after 7 days of inactivity
    - cron: '0 8 */6 * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/accounts?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "✓ Supabase is alive"
          else
            echo "⚠️ Unexpected status $STATUS — check your project at supabase.com"
          fi
